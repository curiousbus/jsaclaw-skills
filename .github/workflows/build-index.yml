name: Build Skill Index

on:
  push:
    paths:
      - 'skills/*/SKILL.md'

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate index.json
        run: |
          echo "[" > index.json
          first=true
          for dir in skills/*/; do
            name=$(basename "$dir")
            if [ -f "${dir}SKILL.md" ]; then
              # 提取第一个 # 标题行作为 summary
              summary=$(grep -m1 '^#' "${dir}SKILL.md" | sed 's/^#\+[[:space:]]*//')
              if [ -z "$summary" ]; then
                summary="$name"
              fi
              if [ "$first" = true ]; then
                first=false
              else
                echo "," >> index.json
              fi
              printf '  { "name": "%s", "summary": "%s" }' "$name" "$summary" >> index.json
            fi
          done
          echo "" >> index.json
          echo "]" >> index.json

      - name: Commit index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          if git diff --cached --quiet; then
            echo "No changes to index.json"
          else
            git commit -m "chore: update skill index [skip ci]"
            git push
          fi
